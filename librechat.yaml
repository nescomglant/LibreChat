version: 1.3.5
cache: true

endpoints:
  anthropic:
    apiKey: "${ANTHROPIC_API_KEY}"
    titleConvo: true
    titleModel: "current_model"   # Corretto l'ID del modello Anthropic

  custom:
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_API_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default: [
          "openai/gpt-4o",
          "anthropic/claude-3.5-sonnet",
          "google/gemini-flash-1.5"
        ]
        fetch: true
      titleConvo: true
      titleModel: "current_model" # <-- Titoli a costo zero!
      titleMethod: "completion"
      modelDisplayLabel: "OpenRouter"

webSearch:
  searchProvider: "tavily"
  tavilyApiKey: "${TAVILY_API_KEY}"
  tavilySearchOptions:
    searchDepth: "advanced" # Abilita il Deep Research (legge più fonti a fondo)
    maxResults: 10           # Numero di siti da analizzare

mcpServers:
  gmail:
    type: stdio
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-gmail"
    env:
      GMAIL_CLIENT_ID: "${GMAIL_CLIENT_ID}"
      GMAIL_CLIENT_SECRET: "${GMAIL_CLIENT_SECRET}"    
