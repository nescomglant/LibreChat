version: 1.3.5
cache: true

endpoints:
  anthropic:
    apiKey: "${ANTHROPIC_API_KEY}"
    titleConvo: true
    titleModel: "claude-3-5-haiku-20241022"   # Corretto l'ID del modello Anthropic

  custom:
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_API_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default: [
          "openai/gpt-4o",
          "anthropic/claude-3.5-sonnet",
          "google/gemini-flash-1.5"
        ]
        fetch: true
      titleConvo: true
      titleModel: "openrouter/free" # <-- Titoli a costo zero!
      titleMethod: "completion"
      modelDisplayLabel: "OpenRouter"
